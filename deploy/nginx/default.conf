server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA — React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: proxy GHN/GeoVina if FE build uses /ghn-proxy (dev-style paths).
    # Production builds should call APIs directly via VITE_* env at build time.

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
