# CosMate — chạy local cho giảng viên chấm (Windows/macOS/Linux có Docker)
# Đọc README_Deploy.md trước khi chạy: docker compose --env-file .env up -d

services:
  api:
    image: eclipse-temurin:21-jre-alpine
    container_name: cosmate-api
    working_dir: /app
    command: ["java", "-jar", "/app/cosplay-rental-api.jar"]
    ports:
      - "${API_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      PORT: 8080
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      # Kết nối SQL Server trên máy host (SSMS / Docker Desktop)
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:sqlserver://host.docker.internal:1433;encrypt=true;trustServerCertificate=true;databaseName=CosMate}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8080}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SPRING_WEB_CORS_ALLOWED_ORIGINS: ${SPRING_WEB_CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:80,http://localhost:5173}
    volumes:
      - ./backend-build/cosplay-rental-api.jar:/app/cosplay-rental-api.jar:ro
      # Firebase (tuỳ chọn — upload ảnh). Đặt file JSON cạnh jar hoặc mount:
      # - ./backend-build/cosmate-firebase.json:/app/cosmate-firebase.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  web:
    image: nginx:1.27-alpine
    container_name: cosmate-web
    ports:
      - "${WEB_PORT:-80}:80"
    volumes:
      - ./frontend-build/dist:/usr/share/nginx/html:ro
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped
